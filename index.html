<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="authScreen" class="auth-screen">
      <div class="auth-card">
        <h1>Life Grid 登入</h1>
        <p class="auth-subtitle">使用帳號與密碼登入，開始你的任務挑戰。</p>

        <form id="loginForm" class="login-form">
          <label for="username">帳號</label>
          <input id="username" name="username" type="text" autocomplete="username" inputmode="text" placeholder="請輸入帳號" required />

          <label for="password">密碼</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="請輸入密碼" required />

          <button type="submit" class="primary-btn">登入</button>
        </form>

        <p id="authMessage" class="auth-message" role="status" aria-live="polite"></p>
      </div>
    </section>

    <div id="app" class="app hidden">
      <header class="topbar">
        <button id="menuButton" class="menu-button" aria-label="Open task details" aria-controls="sidebar" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div>
          <h1>Life Grid</h1>
          <p id="userBadge" class="user-badge"></p>
        </div>
      </header>

      <main>
        <section class="grid-section" aria-label="Task Grid">
          <div class="level-legend" aria-hidden="true">
            <div class="legend-item level-S">S × 1</div>
            <div class="legend-item level-A">A × 8</div>
            <div class="legend-item level-B">B × 8</div>
            <div class="legend-item level-C">C × 8</div>
          </div>
          <div id="taskGrid" class="task-grid"></div>
        </section>
      </main>
    </div>

    <aside id="sidebar" class="sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <h2>Task Details</h2>
        <button id="closeButton" class="close-button" aria-label="Close task details">×</button>
      </div>

      <section id="adminPanel" class="admin-panel hidden">
        <h3>後台（示範）</h3>
        <p>目前登入者：<strong id="adminName"></strong></p>
        <p>排序：<strong>No.1 用戶</strong></p>
        <p class="hash-line">帳號 hash：<code id="accountHash"></code></p>
        <p class="hash-line">密碼 hash：<code id="passwordHash"></code></p>
      </section>

      <ul id="taskDetails" class="task-details"></ul>
    </aside>

    <div id="overlay" class="overlay hidden" aria-hidden="true"></div>

    <script src="script.js"></script>
  </body>
</html>
