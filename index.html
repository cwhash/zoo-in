<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoo-In</title>
    <link rel="stylesheet" href="styles.css" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
    <script src="firebase-config.js"></script>
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <section class="login-card" aria-labelledby="loginTitle">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16l4.5 4.5"></path>
          </svg>
        </div>
        <h1 id="loginTitle">ZOO-IN</h1>
        <button id="googleSignInBtn" class="google-signin-btn" type="button">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="20" height="20" />
          Google 登入
        </button>
        <p id="loginError" class="login-error" role="alert"></p>
      </section>
    </div>

    <div id="app" class="app" hidden>
      <header class="topbar">
        <button id="menuButton" class="icon-button" type="button" aria-label="開啟選單" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <h1 id="pageTitle">ZOO-IN</h1>
        <button id="profileButton" class="avatar-button" type="button" aria-label="會員資料" aria-expanded="false">
          <img id="googleAvatar" class="google-avatar" alt="" />
        </button>
      </header>

      <main>
        <section id="dashboardView" class="dashboard-view">
          <section class="unlock-panel" aria-labelledby="unlockTitle">
            <p class="eyebrow">活動代碼</p>
            <h2 id="unlockTitle">解鎖活動</h2>
            <form id="unlockForm" class="unlock-form">
              <input id="activityCodeInput" type="text" autocomplete="off" placeholder="輸入活動代碼" />
              <button id="unlockBtn" class="primary-btn" type="submit">解鎖</button>
            </form>
            <p id="unlockMessage" class="form-message" aria-live="polite"></p>
          </section>

          <section class="activity-panel" aria-labelledby="myActivitiesTitle">
            <div class="section-head">
              <div>
                <p class="eyebrow">我的活動</p>
                <h2 id="myActivitiesTitle">已解鎖</h2>
              </div>
            </div>
            <div id="activityCards" class="activity-cards"></div>
            <p id="emptyActivities" class="empty-text">尚未解鎖任何活動。</p>
          </section>
        </section>

        <section id="lifeGridView" class="life-grid-view hidden" aria-labelledby="lifeGridTitle">
          <section class="activity-hero">
            <div>
              <p class="eyebrow">Life Grid 2027</p>
              <h2 id="lifeGridTitle">Life Grid</h2>
              <p id="activityPeriod" class="muted-text">2026/07/01 - 2027/12/31</p>
            </div>
            <div class="progress-pill">
              <strong id="completedCount">0 / 25</strong>
              <span>已完成</span>
            </div>
          </section>

          <section class="countdown-section" aria-label="活動倒數">
            <p class="countdown-title">活動倒數</p>
            <p id="deadlineCountdown" class="countdown-value" aria-live="polite">載入中...</p>
          </section>

          <section class="grid-section" aria-label="Life Grid 任務格">
            <div class="level-legend" aria-hidden="true">
              <div class="legend-item level-S">S 1</div>
              <div class="legend-item level-A">A 2</div>
              <div class="legend-item level-B">B 4</div>
              <div class="legend-item level-C">C 8</div>
              <div class="legend-item level-N">N 10</div>
            </div>
            <div id="taskGrid" class="task-grid"></div>
          </section>

          <section class="achievement-panel" aria-labelledby="achievementsTitle">
            <div class="section-head">
              <div>
                <p class="eyebrow">隱藏成就</p>
                <h2 id="achievementsTitle">已解鎖成就</h2>
              </div>
              <span id="achievementCount" class="small-pill">0</span>
            </div>
            <div id="achievementList" class="achievement-list"></div>
            <p id="emptyAchievements" class="empty-text">尚未解鎖成就。</p>
          </section>

          <section class="feed-panel" aria-labelledby="feedTitle">
            <div class="section-head">
              <div>
                <p class="eyebrow">公開動態</p>
                <h2 id="feedTitle">近期完成與成就</h2>
              </div>
            </div>
            <div id="activityFeed" class="activity-feed" aria-live="polite"></div>
            <p id="emptyFeed" class="empty-text">目前還沒有公開動態。</p>
          </section>
        </section>
      </main>
    </div>

    <aside id="navDrawer" class="side-drawer left-drawer" aria-hidden="true" aria-labelledby="navDrawerTitle">
      <div class="drawer-header">
        <h2 id="navDrawerTitle">選單</h2>
        <button id="closeNavDrawerBtn" class="close-button" type="button" aria-label="關閉">×</button>
      </div>
      <nav class="drawer-nav">
        <button id="homeNavBtn" type="button">活動中心</button>
        <button id="lifeGridNavBtn" type="button">Life Grid 2027</button>
      </nav>
    </aside>

    <aside id="profileDrawer" class="side-drawer right-drawer" aria-hidden="true" aria-labelledby="profileDrawerTitle">
      <div class="drawer-header">
        <h2 id="profileDrawerTitle">會員資料</h2>
        <button id="closeProfileDrawerBtn" class="close-button" type="button" aria-label="關閉">×</button>
      </div>
      <div class="account-identity">
        <img id="profileGoogleAvatar" class="profile-avatar" alt="" />
        <div>
          <p class="eyebrow">Google 帳號</p>
          <h3 id="googleName">-</h3>
          <p id="googleEmail" class="muted-text">-</p>
        </div>
      </div>
      <div class="profile-form">
        <label>
          <span>公開暱稱</span>
          <input id="nickNameInput" type="text" maxlength="10" placeholder="匿名" />
        </label>
        <label>
          <span>真實姓名</span>
          <input id="realNameInput" type="text" autocomplete="name" />
        </label>
        <label>
          <span>地址</span>
          <input id="addressInput" type="text" autocomplete="street-address" />
        </label>
        <button id="saveProfileBtn" class="primary-btn" type="button">儲存會員資料</button>
        <p id="profileMessage" class="form-message" aria-live="polite"></p>
        <button id="signOutBtn" class="ghost-btn" type="button">登出</button>
      </div>
    </aside>

    <aside id="taskPanel" class="task-panel" aria-hidden="true" aria-labelledby="taskPanelTitle">
      <div class="task-panel-header">
        <div>
          <p id="taskPanelCode" class="eyebrow">任務</p>
          <h2 id="taskPanelTitle">任務內容</h2>
        </div>
        <button id="closeTaskPanelBtn" class="close-button" type="button" aria-label="關閉">×</button>
      </div>
      <div id="taskPanelBody" class="task-panel-body"></div>
    </aside>
    <div id="overlay" class="overlay hidden"></div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <script type="module" src="js/platform/app.js"></script>
  </body>
</html>
