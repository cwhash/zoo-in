<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Grid</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- Firebase CDN (compat v9) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
  </head>
  <body>
    <!-- 登入畫面 -->
    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <h1>🗳️ Life Grid</h1>
        <p>請登入以繼續使用</p>
        <button id="googleSignInBtn" class="google-signin-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
          使用 Google 登入
        </button>
      </div>
    </div>

    <div id="app" class="app" style="display:none">
      <header class="topbar">
        <button
          id="menuButton"
          class="menu-button"
          aria-label="Open task details"
          aria-controls="sidebar"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <h1>Life Grid</h1>
        <div class="user-info" id="userInfo" style="display:none;">
          <button id="userMenuButton" type="button" class="user-menu-button" aria-label="開啟會員資訊" aria-expanded="false">
            <img id="userAvatar" src="" alt="" class="user-avatar" />
          </button>
          <div id="userMenuPanel" class="user-menu-panel hidden" role="menu" aria-hidden="true">
            <p class="member-title">會員資訊</p>
            <label class="member-field">
              <span>real_name</span>
              <input id="memberRealNameInput" type="text" />
            </label>
            <label class="member-field">
              <span>nick_name</span>
              <input id="memberNickNameInput" type="text" />
            </label>
            <label class="member-field">
              <span>address</span>
              <input id="memberAddressInput" type="text" />
            </label>
            <button id="memberSaveBtn" type="button" class="member-save-btn">儲存會員資料</button>
            <button id="signOutBtn" type="button" class="signout-btn">登出</button>
          </div>
        </div>
      </header>

      <main>
        <section class="grid-section" aria-label="Task Grid">
          <div class="level-legend" aria-hidden="true">
            <div class="legend-item level-S">S × 1</div>
            <div class="legend-item level-A">A × 2</div>
            <div class="legend-item level-B">B × 4</div>
            <div class="legend-item level-C">C × 8</div>
            <div class="legend-item level-N">N × 10</div>
          </div>
          <div id="taskGrid" class="task-grid"></div>
        </section>

        <section class="countdown-section" aria-label="Deadline countdown">
          <p class="countdown-title">Deadline</p>
          <p id="deadlineCountdown" class="countdown-value" aria-live="polite">
            Loading...
          </p>
        </section>
      </main>

      <aside id="sidebar" class="sidebar" aria-hidden="true" aria-label="任務詳情">
        <div class="sidebar-header">
          <h2 id="sidebarTitle">任務詳情</h2>
          <button id="closeButton" class="close-button" aria-label="關閉側欄">×</button>
        </div>
        <ul id="taskDetails" class="task-details"></ul>
      </aside>
      <div id="overlay" class="overlay hidden"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
