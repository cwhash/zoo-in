<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <button
          id="menuButton"
          class="menu-button"
          aria-label="Open task details"
          aria-controls="sidebar"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <h1>Life Grid</h1>
      </header>

      <main>
        <section class="grid-section" aria-label="Task Grid">
          <div class="level-legend" aria-hidden="true">
            <div class="legend-item level-S">S × 1</div>
            <div class="legend-item level-A">A × 2</div>
            <div class="legend-item level-B">B × 4</div>
            <div class="legend-item level-C">C × 8</div>
            <div class="legend-item level-N">N × 10</div>
          </div>
          <div id="taskGrid" class="task-grid"></div>
        </section>

        <section class="countdown-section" aria-label="Deadline countdown">
          <p class="countdown-title">Deadline Countdown</p>
          <p id="deadlineCountdown" class="countdown-value" aria-live="polite">
            Loading...
          </p>
        </section>
      </main>
    </div>

    <aside id="sidebar" class="sidebar" aria-hidden="true">
      <div class="sidebar-header">
        <h2 id="sidebarTitle">任務詳情</h2>
        <button id="closeButton" class="close-button" aria-label="Close task details">&times;</button>
      </div>
      <ul id="taskDetails" class="task-details"></ul>
    </aside>

    <div id="overlay" class="overlay hidden" aria-hidden="true"></div>

    <script src="script.js"></script>
  </body>
</html>
