name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-functions
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: firebase-functions
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-service-account.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZOO_IN }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"

      - name: Install Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Check Functions syntax
        working-directory: functions
        run: npm run lint

      - name: Test Functions
        working-directory: functions
        run: npm test

      - name: Deploy Functions
        shell: bash
        run: |
          set +e
          npx firebase-tools@latest deploy --only functions:unlockActivity,functions:completeTask,functions:adminSyncClaims,functions:adminSyncAllClaims,functions:adminUpdateActivityCode,functions:adminUpdateNTask,functions:adminResetTaskCompletion,functions:adminDeleteUserData --project zoo-in --non-interactive --debug 2>&1 | tee functions-deploy.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::Firebase deploy log tail"
            tail -n 160 functions-deploy.log
            echo "::endgroup::"
            message=$(tail -n 80 functions-deploy.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Firebase Functions deploy failed::$message"
            exit "$status"
          fi
