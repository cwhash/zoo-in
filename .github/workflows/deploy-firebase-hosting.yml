name: Deploy static site to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: firebase-hosting
      url: https://zoo-in.web.app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Replace API Key
        run: sed -i 's/__FIREBASE_WEB_API_KEY__/${{ secrets.FIREBASE_WEB_API_KEY }}/g' client/.env.production

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build Vue client
        working-directory: client
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZOO_IN }}
          projectId: zoo-in
          channelId: live
          entryPoint: .
