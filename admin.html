<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoo-In Admin</title>
    <link rel="stylesheet" href="styles.css" />

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
    <script src="firebase-config.js"></script>
  </head>
  <body>
    <div id="adminLogin" class="login-screen">
      <section class="login-card" aria-labelledby="adminLoginTitle">
        <p class="eyebrow">Zoo-In Admin</p>
        <h1 id="adminLoginTitle">管理員登入</h1>
        <p>使用被授權的 Google 帳號進入獨立後台。</p>
        <button id="adminSignInBtn" class="google-signin-btn" type="button">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="20" height="20" />
          使用 Google 登入
        </button>
        <p id="adminLoginMessage" class="login-error" role="alert"></p>
      </section>
    </div>

    <div id="adminApp" class="app" hidden>
      <header class="topbar">
        <div>
          <p class="eyebrow">Zoo-In Admin</p>
          <h1>Life Grid 後台</h1>
        </div>
        <a class="ghost-btn admin-link-btn" href="index.html">回前台</a>
        <button id="adminSignOutBtn" class="ghost-btn" type="button">登出</button>
      </header>

      <main class="admin-grid">
        <section class="admin-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">活動代碼</p>
              <h2>Life Grid 活動代碼</h2>
            </div>
          </div>
          <p id="codeUsage" class="muted-text">載入中...</p>
        </section>

        <section class="admin-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">官方任務</p>
              <h2>N 任務編輯</h2>
            </div>
          </div>
          <div id="nTaskEditor" class="n-task-editor"></div>
        </section>

        <section class="admin-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">管理操作</p>
              <h2>取消會員任務完成</h2>
            </div>
          </div>
          <form id="resetTaskForm" class="profile-form">
            <label>
              <span>會員 UID</span>
              <input id="resetUidInput" type="text" autocomplete="off" />
            </label>
            <label>
              <span>任務代號</span>
              <input id="resetTaskIdInput" type="text" autocomplete="off" placeholder="例如 A1" />
            </label>
            <button id="resetTaskBtn" class="primary-btn" type="submit">取消完成狀態</button>
            <p id="resetTaskMessage" class="form-message" aria-live="polite"></p>
          </form>
        </section>

        <section class="admin-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">資料刪除</p>
              <h2>刪除會員活動資料</h2>
            </div>
          </div>
          <form id="deleteUserDataForm" class="profile-form">
            <label>
              <span>會員 UID</span>
              <input id="deleteUidInput" type="text" autocomplete="off" />
            </label>
            <button id="deleteUserDataBtn" class="ghost-btn" type="submit">刪除資料</button>
            <p id="deleteUserDataMessage" class="form-message" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script src="admin.js"></script>
  </body>
</html>
